# Langfuse v3 on the production VPS. Run with the app stack:
#
#   docker compose -f infra/vps/docker-compose.db.yml \
#     -f infra/vps/docker-compose.langfuse.yml --env-file .env.prod up -d
#
# UI (via Caddy): https://langfuse.casas.markkop.dev

services:
  langfuse-db-init:
    image: postgres:17-alpine
    container_name: minha-casa-langfuse-db-init-1
    depends_on:
      minha-casa-db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      PGUSER: ${POSTGRES_USER:?set POSTGRES_USER}
      PGHOST: minha-casa-db
    entrypoint:
      - /bin/sh
      - -lc
      - |
        psql -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'langfuse'" | grep -q 1 \
          || psql -d postgres -c "CREATE DATABASE langfuse"
    networks:
      - minha_casa_internal

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: minha-casa-langfuse-clickhouse-1
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:?set LANGFUSE_CLICKHOUSE_PASSWORD}
      TZ: UTC
    volumes:
      - minha_casa_langfuse_clickhouse:/var/lib/clickhouse
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - minha_casa_internal

  langfuse-redis:
    image: redis:7-alpine
    container_name: minha-casa-langfuse-redis-1
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${LANGFUSE_REDIS_PASSWORD:?set LANGFUSE_REDIS_PASSWORD}
      --maxmemory-policy noeviction
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${LANGFUSE_REDIS_PASSWORD:?set LANGFUSE_REDIS_PASSWORD}",
          "ping",
        ]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - minha_casa_internal

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: minha-casa-langfuse-web-1
    restart: unless-stopped
    depends_on:
      langfuse-db-init:
        condition: service_completed_successfully
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment: &langfuse_env
      # Next.js binds to container hostname by default; on dual networks Caddy hits caddy_net IP and gets 502.
      HOSTNAME: "0.0.0.0"
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:?set LANGFUSE_NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?set LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT:?set LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?set LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: ${LANGFUSE_TELEMETRY_ENABLED:-false}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@minha-casa-db:5432/langfuse
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-clickhouse}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:?set LANGFUSE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD:?set LANGFUSE_REDIS_PASSWORD}
      REDIS_TLS_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse-events}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minhacasa}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse-events}
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minhacasa}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:?set LANGFUSE_INIT_ORG_ID}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-Minha Casa}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:?set LANGFUSE_INIT_PROJECT_ID}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-minha-casa-prod}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:?set LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:?set LANGFUSE_INIT_PROJECT_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:?set LANGFUSE_INIT_USER_EMAIL}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-Admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:?set LANGFUSE_INIT_USER_PASSWORD}
    networks:
      - minha_casa_internal
      - caddy_net

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: minha-casa-langfuse-worker-1
    restart: unless-stopped
    depends_on:
      langfuse-db-init:
        condition: service_completed_successfully
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      <<: *langfuse_env
    networks:
      - minha_casa_internal

networks:
  minha_casa_internal:
    external: true
    name: vps_minha_casa_internal
  caddy_net:
    external: true

volumes:
  minha_casa_langfuse_clickhouse:
