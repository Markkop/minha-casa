# Minha Casa production stack for a shared VPS.
#
# Shape:
#   - Postgres remains the source of truth.
#   - Phoenix runs the AI backend, workflows, WhatsApp webhooks, MCP, and attachments.
#   - MinIO stores AI/chat attachments.
#   - The shared /docker/caddy stack exposes Phoenix/MinIO through caddy_net.
#   - Do not reuse Todo Idle Quest containers, DBs, users, volumes, or ports.
#
# Prerequisites on VPS:
#   cp infra/vps/.env.prod.example .env.prod
#   openssl rand -base64 36   # set POSTGRES_PASSWORD in .env.prod
#   ./infra/vps/scripts/generate-postgres-tls.sh
#
# Deploy:
#   docker compose -f infra/vps/docker-compose.db.yml --env-file .env.prod up -d

services:
  minha-casa-db:
    image: postgres:17-alpine
    container_name: minha-casa-db-1
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    command:
      - "postgres"
      - "-c"
      - "ssl=on"
      - "-c"
      - "ssl_cert_file=/var/lib/postgresql/server.crt"
      - "-c"
      - "ssl_key_file=/var/lib/postgresql/server.key"
    ports:
      - "${POSTGRES_PUBLIC_PORT:-5433}:5432"
    volumes:
      - minha_casa_pgdata:/var/lib/postgresql/data
      - ./certs/server.crt:/var/lib/postgresql/server.crt:ro
      - ./certs/server.key:/var/lib/postgresql/server.key:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - minha_casa_internal

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minha-casa-minio-1
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minhacasa}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
    volumes:
      - minha_casa_minio:/data
    networks:
      - minha_casa_internal
      - caddy_net

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minhacasa}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-minha-casa-ai}
    entrypoint:
      - /bin/sh
      - -lc
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}"; do sleep 2; done
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc mb --ignore-existing "local/$${LANGFUSE_S3_BUCKET:-langfuse-events}"
    networks:
      - minha_casa_internal

  phoenix-api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: minha-casa-phoenix-api-1
    restart: unless-stopped
    depends_on:
      minha-casa-db:
        condition: service_healthy
      minio:
        condition: service_started
      hermes-agent:
        condition: service_started
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@minha-casa-db:5432/${POSTGRES_DB:?set POSTGRES_DB}
      DATABASE_SSL: "false"
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      SECRET_KEY_BASE: ${PHOENIX_SECRET_KEY_BASE:?set PHOENIX_SECRET_KEY_BASE}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?set INTERNAL_API_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-low}
      SCRAPINGANT_API_KEY: ${SCRAPINGANT_API_KEY:-}
      BRAVE_SEARCH_API_KEY: ${BRAVE_SEARCH_API_KEY:-}
      GOOGLE_MAPS_SERVER_API_KEY: ${GOOGLE_MAPS_SERVER_API_KEY:-${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET: ${MINIO_BUCKET:-minha-casa-ai}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minhacasa}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://your-app-domain.example.com}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      BETTER_AUTH_JWKS_URL: ${BETTER_AUTH_JWKS_URL:-}
      ASSISTANT_LLM_ENABLED: ${ASSISTANT_LLM_ENABLED:-true}
      HERMES_API_URL: ${HERMES_API_URL:-}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      HERMES_JOBS_DIR: /work/hermes-jobs
      HERMES_ANALYSIS_TIMEOUT_MS: ${HERMES_ANALYSIS_TIMEOUT_MS:-1800000}
      PROPERTY_ANALYSIS_ENGINE: ${PROPERTY_ANALYSIS_ENGINE:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-web:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_ENV: ${LANGFUSE_ENV:-production}
      LANGFUSE_PROMPT_LABEL: ${LANGFUSE_PROMPT_LABEL:-production}
    volumes:
      - minha_casa_hermes_jobs:/work/hermes-jobs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - minha_casa_internal
      - caddy_net

  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: minha-casa-hermes-agent-1
    restart: unless-stopped
    command:
      - /bin/sh
      - -lc
      - |
        sed -i -E "s|^([[:space:]]*)default: .*|\1default: \"$${HERMES_INFERENCE_MODEL:-gpt-5.4-mini}\"|; s|^([[:space:]]*)provider: .*|\1provider: \"$${HERMES_INFERENCE_PROVIDER:-custom}\"|; s|^([[:space:]]*)base_url: .*|\1base_url: \"$${CUSTOM_BASE_URL:-https://api.openai.com/v1}\"|" /opt/data/config.yaml 2>/dev/null || true
        /opt/hermes/.venv/bin/hermes gateway run
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8642
      API_SERVER_KEY: ${HERMES_API_KEY:?set HERMES_API_KEY}
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-custom}
      HERMES_INFERENCE_MODEL: ${HERMES_INFERENCE_MODEL:-gpt-5.4-mini}
      HERMES_MODEL: ${HERMES_INFERENCE_MODEL:-gpt-5.4-mini}
      CUSTOM_BASE_URL: ${HERMES_CUSTOM_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    expose:
      - "8642"
    volumes:
      - minha_casa_hermes_data:/opt/data
      - minha_casa_hermes_jobs:/work/hermes-jobs
    networks:
      - minha_casa_internal

networks:
  minha_casa_internal:
    driver: bridge
  caddy_net:
    external: true

volumes:
  minha_casa_pgdata:
  minha_casa_minio:
  minha_casa_hermes_data:
  minha_casa_hermes_jobs:
