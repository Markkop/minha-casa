services:
  minha-casa-local-db:
    image: postgres:17-alpine
    container_name: minha-casa-local-db-1
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minhacasa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minhacasa_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-minha_casa_local}
    ports:
      - "${POSTGRES_PUBLIC_PORT:-5434}:5432"
    volumes:
      - minha_casa_local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  minha_casa_local_pgdata:
