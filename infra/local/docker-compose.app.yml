# Isolated project name so `docker compose … --remove-orphans` does not remove
# containers from infra/local/docker-compose.db.yml (separate project).
name: minha-casa-app

services:
  postgres:
    image: postgres:17-alpine
    container_name: minha-casa-app-postgres-1
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-minhacasa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minhacasa_local_password}
      POSTGRES_DB: ${POSTGRES_DB:-minha_casa_local}
    ports:
      - "${APP_POSTGRES_PUBLIC_PORT:-5435}:5432"
    volumes:
      - minha_casa_app_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - minha_casa_local

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minha-casa-local-minio-1
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minhacasa}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minhacasa_local_password}
    ports:
      - "${MINIO_PUBLIC_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PUBLIC_PORT:-9001}:9001"
    volumes:
      - minha_casa_local_minio:/data
    networks:
      - minha_casa_local

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minhacasa}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minhacasa_local_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-minha-casa-ai}
    entrypoint:
      - /bin/sh
      - -lc
      - |
        until mc alias set local http://minio:9000 "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}"; do sleep 2; done
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc mb --ignore-existing "local/$${LANGFUSE_S3_BUCKET:-langfuse-events}"
    networks:
      - minha_casa_local

  phoenix-api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: minha-casa-phoenix-api-1
    restart: unless-stopped
    env_file:
      - ../../.env
      - ../../.env.local
      # Local Docker overrides (Hermes, DB ports, etc.) — see infra/local/.env.local.example
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      hermes-agent:
        condition: service_started
    environment:
      PORT: 4000
      DATABASE_URL: ${BACKEND_DATABASE_URL:-postgresql://minhacasa:minhacasa_local_password@postgres:5432/minha_casa_local}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      DATABASE_POOL_MAX: ${DATABASE_POOL_MAX:-10}
      SECRET_KEY_BASE: ${PHOENIX_SECRET_KEY_BASE:-local-secret-key-base-local-secret-key-base-local-secret-key-base-local-secret-key-base}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-local-internal-api-secret}
      # OPENAI / Brave / Google keys come from env_file (.env + .env.local) — do not set empty defaults here
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_BUCKET: ${MINIO_BUCKET:-minha-casa-ai}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minhacasa}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minhacasa_local_password}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET:-}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:5173}
      # JWKS URL comes from env_file (infra/local/.env.local) so host-only Svelte dev
      # (host.docker.internal) is not overridden by a compose-time default (svelte-web).
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      ASSISTANT_LLM_ENABLED: ${ASSISTANT_LLM_ENABLED:-true}
      # Defaults match infra/local/.env.local.example; host env can override via infra/local/.env
      HERMES_API_URL: ${HERMES_API_URL:-http://hermes-agent:8642}
      HERMES_API_KEY: ${HERMES_API_KEY:-local-hermes-api-key}
      HERMES_JOBS_DIR: /work/hermes-jobs
      HERMES_ANALYSIS_TIMEOUT_MS: ${HERMES_ANALYSIS_TIMEOUT_MS:-1800000}
      PROPERTY_ANALYSIS_ENGINE: ${PROPERTY_ANALYSIS_ENGINE:-hermes}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse-web:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_ENV: ${LANGFUSE_ENV:-local}
      LANGFUSE_PROMPT_LABEL: ${LANGFUSE_PROMPT_LABEL:-production}
    volumes:
      - minha_casa_local_hermes_jobs:/work/hermes-jobs
    ports:
      - "${PHOENIX_PUBLIC_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - minha_casa_local

  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: minha-casa-hermes-agent-1
    restart: unless-stopped
    env_file:
      - ../../.env
      - ../../.env.local
      - .env.local
    command:
      - /bin/sh
      - -lc
      - |
        sed -i -E "s|^([[:space:]]*)default: .*|\1default: \"$${HERMES_INFERENCE_MODEL:-gpt-5.4-mini}\"|; s|^([[:space:]]*)provider: .*|\1provider: \"$${HERMES_INFERENCE_PROVIDER:-custom}\"|; s|^([[:space:]]*)base_url: .*|\1base_url: \"$${CUSTOM_BASE_URL:-https://api.openai.com/v1}\"|" /opt/data/config.yaml 2>/dev/null || true
        if [ -n "$$OPENAI_API_KEY" ] && [ -f /opt/data/.env ]; then
          if grep -q '^OPENAI_API_KEY=' /opt/data/.env; then
            sed -i "s|^OPENAI_API_KEY=.*|OPENAI_API_KEY=$$OPENAI_API_KEY|" /opt/data/.env
          else
            printf '\nOPENAI_API_KEY=%s\n' "$$OPENAI_API_KEY" >> /opt/data/.env
          fi
        fi
        /opt/hermes/.venv/bin/hermes gateway run
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8642
      API_SERVER_KEY: ${HERMES_API_KEY:-local-hermes-api-key}
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-custom}
      HERMES_INFERENCE_MODEL: ${HERMES_INFERENCE_MODEL:-gpt-5.4-mini}
      HERMES_MODEL: ${HERMES_INFERENCE_MODEL:-gpt-5.4-mini}
      CUSTOM_BASE_URL: ${HERMES_CUSTOM_BASE_URL:-https://api.openai.com/v1}
      # OPENAI_API_KEY comes from env_file — do not set empty defaults here
    expose:
      - "8642"
    volumes:
      - minha_casa_local_hermes_data:/opt/data
      - minha_casa_local_hermes_jobs:/work/hermes-jobs
    networks:
      - minha_casa_local

  # svelte-web: Better Auth must use BETTER_AUTH_URL=http://localhost:5173 (browser → host port map).
  # Host-only dev: pnpm dev:web with apps/web/.env (same BETTER_AUTH_URL).
  svelte-web:
    image: node:22-alpine
    container_name: minha-casa-svelte-web-1
    restart: unless-stopped
    working_dir: /app
    depends_on:
      phoenix-api:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - ../../.env
      - ../../.env.local
      - .env.local
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://minhacasa:minhacasa_local_password@postgres:5432/minha_casa_local}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-local-better-auth-secret}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:5173}
      BETTER_AUTH_TRUSTED_ORIGINS: ${BETTER_AUTH_TRUSTED_ORIGINS:-http://localhost:5173}
      PUBLIC_API_URL: http://phoenix-api:4000
      PHOENIX_API_URL: http://phoenix-api:4000
      INTERNAL_BACKEND_URL: http://phoenix-api:4000
      BACKEND_API_URL: http://phoenix-api:4000
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-local-internal-api-secret}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SCRAPINGANT_API_KEY: ${SCRAPINGANT_API_KEY:-}
    command: sh -lc "corepack enable && pnpm install --frozen-lockfile && pnpm --dir apps/web dev --host"
    volumes:
      - ../..:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - minha_casa_local_pnpm_store:/root/.local/share/pnpm/store
    ports:
      - "${SVELTE_PUBLIC_PORT:-5173}:5173"
    networks:
      - minha_casa_local

networks:
  minha_casa_local:
    name: minha_casa_local
    driver: bridge

volumes:
  minha_casa_app_pgdata:
  minha_casa_local_minio:
  minha_casa_local_pnpm_store:
  minha_casa_local_hermes_data:
  minha_casa_local_hermes_jobs:
